<!doctype html>
<html lang="en">
<head>
<!-- FEFCO 201 Regular Slotted Container - parametric dieline generator -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FEFCO 201 RSC Dieline Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --paper:#EAEEF2; --card:#FFFFFF; --ink:#141A1F; --muted:#6B7682;
    --line:#D3DAE1; --line2:#E4E9EE; --cut:#E5484D; --crease:#3E63DD;
    --kraft:#C69C6D; --focus:#141A1F;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--sans);
    display:flex;flex-direction:column;min-height:100vh;
  }
  /* top bar */
  header{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 20px;border-bottom:1px solid var(--line);background:var(--card);
    flex-wrap:wrap;
  }
  .brand{display:flex;flex-direction:column;gap:2px;min-width:0}
  .brand .code{
    font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--cut);font-weight:600;
  }
  .brand .name{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .brand .sub{font-size:12px;color:var(--muted)}
  .actions{display:flex;align-items:center;gap:10px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg button{
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    padding:8px 14px;border:0;background:transparent;color:var(--muted);cursor:pointer;
  }
  .seg button.on{background:var(--ink);color:#fff}
  .seg button:not(.on):hover{background:var(--line2);color:var(--ink)}
  .btn{
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    padding:9px 16px;border:1px solid var(--ink);border-radius:8px;background:var(--ink);color:#fff;
    cursor:pointer;
  }
  .btn:hover{background:#000}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{background:var(--line2);color:var(--muted);border-color:var(--line);cursor:not-allowed;opacity:.6}
  .btn:disabled:hover{background:var(--line2)}
  .btn:disabled:active{transform:none}
  .styleSel{
    font-family:var(--mono);font-size:12px;letter-spacing:.04em;
    padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);
    color:var(--ink);cursor:pointer;max-width:260px;
  }
  /* main layout */
  main{flex:1;display:grid;grid-template-columns:220px minmax(0,1fr) 220px;gap:0;min-height:0}
  .rail{
    padding:20px 18px;display:flex;flex-direction:column;gap:18px;background:var(--card);
    overflow:auto;
  }
  .rail.left{border-right:1px solid var(--line)}
  .rail.right{border-left:1px solid var(--line)}
  .rail h2{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:0 0 2px;font-weight:600;
  }
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{
    font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .field label .hint{font-family:var(--mono);font-weight:400;text-transform:none;letter-spacing:0;color:#9aa6b2}
  .field .inp{position:relative;display:flex;align-items:center}
  .field input, .field select{
    width:100%;font-family:var(--mono);font-size:22px;font-weight:500;color:var(--ink);
    padding:8px 42px 8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;
    -moz-appearance:textfield;
  }
  .field select{font-size:14px;padding-right:10px;cursor:pointer}
  .field input[type="text"]{font-size:14px;padding-right:10px;font-family:var(--sans)}
  .field input::-webkit-outer-spin-button,.field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .field input:focus,.field select:focus{outline:2px solid var(--focus);outline-offset:1px;border-color:var(--focus)}
  .field .unit{
    position:absolute;right:12px;font-family:var(--mono);font-size:12px;color:var(--muted);pointer-events:none;
  }
  .stage{
    position:relative;display:flex;align-items:center;justify-content:center;
    background:
      linear-gradient(var(--line2) 1px,transparent 1px) 0 0/24px 24px,
      linear-gradient(90deg,var(--line2) 1px,transparent 1px) 0 0/24px 24px,
      var(--paper);
    overflow:hidden;min-height:340px;
  }
  #svgWrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  #svg{width:100%;height:100%}
  #cvWrap{position:absolute;inset:0;display:none}
  #cvWrap canvas{display:block;width:100%;height:100%}
  .hud{
    position:absolute;left:16px;bottom:14px;font-family:var(--mono);font-size:11px;color:var(--muted);
    background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:7px;padding:7px 10px;
    display:flex;gap:14px;align-items:center;backdrop-filter:blur(2px);
  }
  .hud .k{display:flex;align-items:center;gap:6px}
  .swatch{width:16px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}
  .readout{border-top:1px solid var(--line);padding-top:16px;display:flex;flex-direction:column;gap:12px}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .lab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-family:var(--mono);font-size:16px;color:var(--ink)}
  .orbithint{position:absolute;right:16px;bottom:14px;font-family:var(--mono);font-size:11px;color:var(--muted);display:none}
  /* Build view */
  #buildWrap{position:absolute;inset:0;display:none;overflow:auto;background:var(--paper);padding:18px}
  .bpanel{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .bcols{display:flex;gap:14px;flex-wrap:wrap}
  .bpanel fieldset{flex:1;min-width:260px;border:1px solid var(--line);border-radius:10px;background:var(--card);padding:12px 14px}
  .bpanel legend{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:0 6px}
  .brow{display:flex;align-items:center;gap:6px;margin:7px 0;flex-wrap:wrap;font-size:13px}
  .brow label{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .brow input[type="number"]{width:76px;font-family:var(--mono);font-size:14px;padding:5px 7px;border:1px solid var(--line);border-radius:6px}
  .brow input.bshort{width:52px}
  .brow select{font-family:var(--mono);font-size:13px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;background:#fff}
  .brow span{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .bchk label{text-transform:none;font-weight:400;font-size:13px;color:var(--ink);display:flex;align-items:center;gap:7px}
  .bnote{font-size:12px;color:var(--muted)}
  .bbad{color:var(--cut);font-weight:600}
  .bapply{width:100%}
  .bapply:disabled{opacity:.4;cursor:default}
  .btablewrap{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:52vh}
  #bTable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px}
  #bTable th{position:sticky;top:0;background:var(--card);text-align:left;padding:9px 12px;font-size:10.5px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
  #bTable td{padding:7px 12px;border-bottom:1px solid var(--line2);white-space:nowrap}
  #bTable tbody tr{cursor:pointer}
  #bTable tbody tr:hover{background:var(--line2)}
  #bTable tr.bsel{background:#fbe9d3}
  #bTable tr.bsel td{font-weight:600}
  #bTable tr.bmisfit td{color:var(--cut)}
  .bcode{font-family:var(--mono);font-size:11px;color:#9aa6b2;margin-left:4px}
  .bunit{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .mode3d{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .depthsel button{letter-spacing:.04em}
  .hud.hier{left:16px;bottom:auto;top:14px;max-width:340px;line-height:1.5;display:block}
  @media (max-width:860px){
    main{grid-template-columns:1fr;grid-template-rows:auto minmax(320px,60vh) auto}
    .rail.left{border-right:0;border-bottom:1px solid var(--line);flex-direction:row;flex-wrap:wrap}
    .rail.right{border-left:0;border-top:1px solid var(--line)}
    .rail.left .field{flex:1;min-width:120px}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="code" id="brandCode">FEFCO 201</span>
    <span class="name" id="brandName">Regular Slotted Container</span>
    <span class="sub">Parametric dieline generator</span>
  </div>
  <div class="actions">
    <select id="style" class="styleSel" title="Packaging style"></select>
    <div class="seg" role="tablist">
      <button id="tab2d" class="on">2D Dieline</button>
      <button id="tab3d">3D Fold</button>
      <button id="tabPal">Palletize</button>
      <button id="tabBuild">Build</button>
    </div>
    <button class="btn" id="btnDXF">Export DXF</button>
    <button class="btn" id="btnArt" style="display:none">Artwork SVG</button>
    <button class="btn" id="btnSpec" style="display:none">Copy film spec</button>
  </div>
</header>

<main>
  <!-- LEFT: primary dimensions (fields built from the style registry) -->
  <aside class="rail left">
    <h2>Inside dimensions</h2>
    <div id="dimFields" style="display:contents"></div>
    <div class="field">
      <label>Print text <span class="hint">front panel</span></label>
      <div class="inp"><input id="txt" type="text" value="FRAGILE" maxlength="40" autocomplete="off"></div>
    </div>
    <div id="optFields" style="display:contents"></div>

    <h2 style="margin-top:6px">Pallet</h2>
    <div class="field">
      <label>Pallet size <span class="hint">L x W</span></label>
      <div class="inp"><input id="pal" type="text" value="48 x 40" autocomplete="off" style="padding-right:42px"><span class="unit" id="uPal">in</span></div>
    </div>
    <div class="field">
      <label>Max load height <span class="hint">incl. pallet</span></label>
      <div class="inp"><input id="palMaxH" type="number" min="0" step="1" value="60"><span class="unit" id="uPalMaxH">in</span></div>
    </div>
    <div class="field">
      <label>Pallet units</label>
      <div class="inp"><select id="palUnits">
        <option value="in">Inches</option>
        <option value="mm">Millimeters</option>
      </select></div>
    </div>
    <div class="field">
      <label>Stack pattern</label>
      <div class="inp"><select id="palPattern">
        <option value="optimal">Optimal (mixed)</option>
        <option value="column">Column</option>
        <option value="interlock">Interlock</option>
      </select></div>
    </div>
  </aside>

  <!-- CENTER: drawing -->
  <section class="stage">
    <div id="svgWrap"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div id="cvWrap"></div>
    <div id="buildWrap"></div>
    <div class="mode3d" id="mode3d" style="display:none">
      <div class="seg"><button id="m3fold">Fold</button></div>
      <div class="seg depthsel">
        <button id="d_product">Product</button><button id="d_wrap">Wrap</button
        ><button id="d_carton">Carton</button><button id="d_case" class="on">Case</button
        ><button id="d_pallet">Pallet</button>
      </div>
    </div>
    <div class="hud" id="hud">
      <span class="k"><span class="swatch" style="border-top-color:var(--cut)"></span>Cut</span>
      <span class="k"><span class="swatch" style="border-top-color:var(--crease);border-top-style:dashed"></span>Crease</span>
      <span class="k">scroll zoom &middot; drag pan &middot; dblclick reset</span>
    </div>
    <div class="hud hier" id="hierHud" style="display:none"></div>
    <div class="orbithint" id="orbithint">drag to orbit &middot; scroll to zoom</div>
  </section>

  <!-- RIGHT: secondary params (from the style registry) + readout -->
  <aside class="rail right">
    <h2>Machine &amp; material</h2>
    <div id="matFields" style="display:contents"></div>
    <div class="field">
      <label>Units</label>
      <div class="inp"><select id="units">
        <option value="mm">Millimeters</option>
        <option value="in">Inches</option>
      </select></div>
    </div>

    <div class="readout">
      <div class="stat"><span class="lab">Blank size</span><span class="val" id="blank">--</span></div>
      <div id="styleStats" style="display:contents"></div>
      <div class="stat"><span class="lab">Board area</span><span class="val" id="area">--</span></div>
    </div>
    <div class="readout">
      <div class="stat"><span class="lab">Pallet pattern</span><span class="val" id="palPat">--</span></div>
      <div class="stat"><span class="lab">Per layer × layers</span><span class="val" id="palCnt">--</span></div>
      <div class="stat"><span class="lab">Total on pallet</span><span class="val" id="palTot">--</span></div>
      <div class="stat"><span class="lab">Deck coverage</span><span class="val" id="palCov">--</span></div>
    </div>
  </aside>
</main>

<script type="module" src="src/ui/app.js"></script>
</body>
</html>
