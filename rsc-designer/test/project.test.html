<!doctype html>
<meta charset="utf-8">
<title>project chain tests</title>
<pre id="out">running…</pre>
<script type="module">
/* Unit tests for core/project.js — the carton -> case -> pallet chain.
   Reference config, hand-derived:
     carton a6120 100×60×150 @ 0.457 -> outer 100.914 × 60.914 × 151.828
     count 12, upright only, clearance wall 1.5 / between 0, vertical 0/0/0
     explicit 4×3×1 -> cavity L 4*100.914+3 = 406.656 -> 407 (1mm up)
                       cavity W 3*60.914+3  = 185.742 -> 186
                       cavity H 151.828 (NO vertical allowance) -> 152
     case outer 413 × 192 × 164 (caliper 3: +6/+6/+12)
     blank 2*(407+186)+35 = 1221 × (152+186) = 338 -> 0.412698 m²
     pallet 1219.2×1016, budget 1524-127, pattern column:
       grid 6×2 rotated = 12/layer, floor(1397/164) = 8 layers
       -> 96 cases, 1152 cartons, coverage 77%                     */
import {newProject, candidateCases, checkLockedCase, roundCavityUp, ROUNDING,
        verticalToOrientations, resolveWrapAxis, swapLW, resolveChainShape} from '../src/core/project.js';
import {fitInto} from '../src/core/containment.js';
import {orientBasis, det3, ORIENTATIONS} from '../src/render/orient.js';

const results = [];
function t(name, fn){
  try{ fn(); results.push(`PASS  ${name}`); }
  catch(e){ results.push(`FAIL  ${name}: ${e.message || e}`); }
}
function approx(a, e, msg = ''){ if(Math.abs(a - e) > 1e-9) throw new Error(`${msg} expected ${e}, got ${a}`); }
function eq(a, e, msg = ''){ if(JSON.stringify(a) !== JSON.stringify(e)) throw new Error(`${msg} expected ${JSON.stringify(e)}, got ${JSON.stringify(a)}`); }

function refProject(){
  const p = newProject();
  p.primary = null;                     // legacy carton-driven chain
  p.secondary.params = {...p.secondary.params, L: 100, W: 60, H: 150, caliper: 0.457};
  p.pallet.pattern = 'column';          // hand-checkable pallet math
  p.links[0].arrangement = {nx: 4, ny: 3, nz: 1};
  return p;
}

t('roundCavityUp steps', () => {
  approx(roundCavityUp({L: 151.828, W: 1, H: 1}, 1).L, 152);
  approx(roundCavityUp({L: 406.656, W: 1, H: 1}, 5).L, 410);
  approx(roundCavityUp({L: 100, W: 1, H: 1}, ROUNDING['1/16in']).L, 100.0125);
  approx(roundCavityUp({L: 407.0000000000001, W: 1, H: 1}, 1).L, 407, 'FP residue absorbed:');
});

t('explicit 4×3×1: full chain matches hand derivation', () => {
  const rows = candidateCases(refProject(), '1mm');
  const r = rows.find(x => x.nx === 4 && x.ny === 3 && x.nz === 1 && x.orientation === 'LWH');
  if(!r) throw new Error('4×3×1 LWH row missing');
  eq(r.cavity, {L: 407, W: 186, H: 152}, 'cavity:');
  eq(r.outer, {L: 413, W: 192, H: 164}, 'outer:');
  approx(r.boardAreaM2, 0.412698, 'board:');
  eq([r.casesPerLayer, r.caseLayers, r.casesPerPallet, r.cartonsPerPallet],
     [12, 8, 96, 1152], 'pallet:');
  eq(r.coveragePct, 77, 'coverage:');
});

t('vertical clearance is NOT applied to cavity height (cartons bear on floor)', () => {
  const rows = candidateCases(refProject(), '1mm');
  const r = rows.find(x => x.nx === 4 && x.ny === 3 && x.nz === 1 && x.orientation === 'LWH');
  // wall 1.5 went into L and W (+3 each) but H is bare carton height, rounded
  approx(r.cavity.H, 152, 'no 2*wall on H:');
});

t('auto enumeration keeps only irreducible grids', () => {
  const p = refProject();
  p.links[0].arrangement = 'auto';
  const rows = candidateCases(p, '1mm');
  if(rows.length === 0) throw new Error('no candidates');
  for(const r of rows){
    const cap = (a, b, c) => a*b*c >= 12;
    if(!cap(r.nx, r.ny, r.nz)) throw new Error(`${r.arrangementLabel} under capacity`);
    if(r.nx > 1 && cap(r.nx - 1, r.ny, r.nz)) throw new Error(`${r.arrangementLabel} reducible in nx`);
    if(r.ny > 1 && cap(r.nx, r.ny - 1, r.nz)) throw new Error(`${r.arrangementLabel} reducible in ny`);
    if(r.nz > 1 && cap(r.nx, r.ny, r.nz - 1)) throw new Error(`${r.arrangementLabel} reducible in nz`);
  }
});

t('locked case: both directions work', () => {
  const p = refProject();
  p.links[0].locked = true;
  p.tertiary.params = {...p.tertiary.params, L: 407, W: 186, H: 152};
  const ok = checkLockedCase(p, '1mm');
  if(!ok.fits || ok.capacity !== 12) throw new Error(`expected fits with capacity 12, got ${ok.fits}/${ok.capacity}`);
  p.tertiary.params = {...p.tertiary.params, L: 300, W: 150, H: 152};
  const bad = checkLockedCase(p, '1mm');
  if(bad.fits) throw new Error('300×150×152 cannot hold 12 cartons but reported fits');
});

t('stored cartons arrangement: 12 cartons, on the floor, inside the walls', () => {
  const rows = candidateCases(refProject(), '1mm');
  const r = rows.find(x => x.nx === 4 && x.ny === 3 && x.nz === 1 && x.orientation === 'LWH');
  const placements = r.arr.cartons.placements;   // single source, read off the row
  eq(placements.length, 12, 'count:');
  for(const p of placements){
    approx(p.z, 75.914, 'z = h/2, bottom clearance 0:');
    if(Math.abs(p.x) + 100.914/2 > 407/2 - 1.5 + 1e-9) throw new Error(`x overflow at ${p.x}`);
    if(Math.abs(p.y) + 60.914/2 > 186/2 - 1.5 + 1e-9) throw new Error(`y overflow at ${p.y}`);
  }
});

/* ---- vertical-axis constraint --------------------------------------- */
t('verticalToOrientations mapping', () => {
  eq(verticalToOrientations('H', true), ['LWH', 'WLH']);
  eq(verticalToOrientations('H', false), ['LWH']);
  eq(verticalToOrientations('L', true), ['WHL', 'HWL']);
  eq(verticalToOrientations('W', false), ['LHW']);
});
t('locked vertical axis constrains the solver (upright loses, upright returned)', () => {
  // carton 50×50×120 in cavity 240×120×60: upright cannot fit at all
  // (120 > 60); on its side it packs 4. H-up MUST return the upright result.
  const child = o => ({outer: {L: 50, W: 50, H: 120}, allowedOrientations: o});
  const cavity = {L: 240, W: 120, H: 60};
  const upright = fitInto(child(verticalToOrientations('H', false)), cavity, {wall: 0, between: 0}, 'column');
  eq(upright.total, 0, 'H up honored even when it fits nothing:');
  const onSide = fitInto(child(verticalToOrientations('W', false)), cavity, {wall: 0, between: 0}, 'column');
  eq(onSide.total, 4, 'W up packs 4:');
  // and the orientation actually used is the constrained one
  if(onSide.placements.some(p => p.orientation !== 'LHW')) throw new Error('unexpected orientation');
});

/* ---- primary (collation) chain -------------------------------------
   Cylinder d50×t6, "multiple pieces collated": 10/stack, Z, 2×2, no gaps
   -> envelope 100×100×60, 40 pieces.  Orientation LWH, clearances 0,
   headspace 0 -> carton cavity 100×100×60 -> a6120 @0.457
   -> carton outer 100.914 × 100.914 × 61.828.
   Case: 12 cartons 4×3×1, wall 1.5 -> cavity 407×306×62 -> outer 413×312×74.
   Pallet (column): 2×3 = 6/layer, floor(1397/74) = 18 layers -> 108 cases,
   1296 cartons, 40×1296 = 51840 pieces. */
function cylProject(){
  const p = newProject();
  p.primary.wrap = null;                // bare envelope: pins predate the wrap
  p.primary.collation = {piece: {kind: 'cylinder', diameter: 50, thickness: 6},
                         perStack: 10, stackAxis: 'Z', nx: 2, ny: 2, stackGap: 0, pieceGap: 0};
  p.primary.allowedOrientations = ['LWH'];
  p.primary.clearance = {wall: 0, between: 0, bottom: 0, top: 0, betweenZ: 0};
  p.pallet.pattern = 'column';
  p.links[0].arrangement = {nx: 4, ny: 3, nz: 1};
  return p;
}

t('primary chain: cylinder collation drives carton then case (hand-checked)', () => {
  const rows = candidateCases(cylProject(), '1mm');
  const r = rows.find(x => x.nx === 4 && x.ny === 3 && x.nz === 1 && x.orientation === 'LWH');
  if(!r) throw new Error('4×3×1 row missing');
  eq(r.cartonParams.L, 100); eq(r.cartonParams.W, 100); eq(r.cartonParams.H, 60);
  approx(r.cartonOuter.L, 100.914); approx(r.cartonOuter.H, 61.828);
  eq(r.cavity, {L: 407, W: 306, H: 62}, 'case cavity:');
  eq(r.outer, {L: 413, W: 312, H: 74}, 'case outer:');
  eq([r.casesPerLayer, r.caseLayers, r.casesPerPallet], [6, 18, 108], 'pallet:');
  eq(r.cartonsPerPallet, 1296);
  eq(r.piecesPerCarton, 40);
  eq(r.piecesPerPallet, 51840);
  eq(r.primaryLabel, 'Stacks upright');
});

t('headspace is added to the carton cavity height (design input, not clearance)', () => {
  const p = cylProject();
  p.primary.clearance.top = 8;
  const rows = candidateCases(p, '1mm');
  const r = rows.find(x => x.nx === 4 && x.ny === 3 && x.nz === 1 && x.orientation === 'LWH');
  eq(r.cartonParams.H, 68, 'cavity H = envelope 60 + headspace 8:');
});

t('locked carton: collation checked against fixed dims, both verdicts', () => {
  const p = cylProject();
  p.links[1].locked = true;
  p.secondary.params = {...p.secondary.params, L: 100, W: 100, H: 60};
  let rows = candidateCases(p, '1mm');
  if(!rows.every(r => r.primaryFits)) throw new Error('exact carton should fit the envelope');
  p.secondary.params = {...p.secondary.params, L: 90};
  rows = candidateCases(p, '1mm');
  if(rows.some(r => r.primaryFits)) throw new Error('90-wide carton cannot hold a 100-wide envelope');
});

t('wrap seal compensation propagates into carton sizing', () => {
  // default box collation env 90×50×120; end seals 10 -> wrap L 110
  const p = newProject();
  p.primary.allowedOrientations = ['LWH'];   // H up, no rotation: deterministic axes
  p.links[0].arrangement = {nx: 4, ny: 3, nz: 1};
  let r = candidateCases(p, '1mm')[0];
  eq(r.cartonParams.L, 110, 'L gains 2×endSeal:');
  eq(r.cartonParams.H, 121, 'folded fin: +gauge only (120.03 -> 121 rounded):');
  p.primary.wrap.params.finTreatment = 'standing';
  r = candidateCases(p, '1mm')[0];
  eq(r.cartonParams.H, 128, 'standing fin: +finHeight:');
  p.primary.wrap.params.sealType = 'lap';
  r = candidateCases(p, '1mm')[0];
  eq(r.cartonParams.H, 120, 'lap seal: no envelope gain:');
  if(!(r.filmAreaM2 > 0 && r.filmKgPerPallet > 0)) throw new Error('film metrics missing');
});

/* ---- Bug 1 regression: a SOLVED carton with a wrap present must yield a
        non-zero, correct cartons-in-case arrangement (nestArrangement used
        the unsolved secondary.params and returned 0 here) ---- */
t('solved carton + wrap: stored cartons arrangement is non-zero and correct', () => {
  const p = newProject();                       // default: box collation + fin wrap, carton SOLVED
  p.primary.allowedOrientations = ['LWH'];
  p.links[0].arrangement = {nx: 4, ny: 3, nz: 1};
  const r = candidateCases(p, '1mm')[0];
  // the carton is solved (≠ the a6120 default 100×60×150)
  if(r.cartonParams.L === 100 && r.cartonParams.W === 60 && r.cartonParams.H === 150)
    throw new Error('carton was not solved from the collation');
  const placements = r.arr.cartons.placements;
  eq(placements.length, 12, 'cartons in case (was 0 with the old nestArrangement):');
  // count matches the arrangement grid nx*ny*nz
  eq(placements.length, r.nx*r.ny*r.nz, 'matches the candidate grid:');
});

/* ---- Bug 1: multiple wraps per carton (links[1], the wrap->carton link) —
   previously ALWAYS 1 (cartonVariants never read link.arrangement). Same
   collation/wrap as the "wrap seal compensation" case above (env 90x50x120,
   fin folded, ends 10 -> wrap outer 110x50x120.03), now 8 wraps explicit
   4x2x1, zero primary clearance:
     cavity L = 4*110 = 440, W = 2*50 = 100, H = 120.03 -> 121 (1mm up)
     piecesPerCarton = 6/wrap * 8 wraps = 48                                */
function multiWrapProject(){
  const p = newProject();
  p.primary.allowedOrientations = ['LWH'];
  p.links[1].count = 8;
  p.links[1].arrangement = {nx: 4, ny: 2, nz: 1};
  p.links[0].arrangement = {nx: 2, ny: 2, nz: 1};
  return p;
}

t('multiple wraps per carton: explicit 4×2×1 sizes the carton around 8 wraps', () => {
  const rows = candidateCases(multiWrapProject(), '1mm');
  const r = rows.find(x => x.nx === 2 && x.ny === 2 && x.nz === 1 && x.orientation === 'LWH');
  if(!r) throw new Error('2×2×1 case row missing');
  eq(r.cartonParams.L, 440, 'carton L = 4 wraps × 110:');
  eq(r.cartonParams.W, 100, 'carton W = 2 wraps × 50:');
  eq(r.cartonParams.H, 121, 'carton H = 120.03 rounded up 1mm:');
  eq(r.piecesPerCarton, 48, '8 wraps × 6 pieces/wrap:');
  eq(r.arr.wraps.count, 8, 'stored wrap arrangement count:');
  eq(r.arr.wraps.placements.length, 8, 'one placement per wrap:');
});

t('multiple wraps per carton: the 8 wraps sit centred inside the carton, none overlapping', () => {
  const rows = candidateCases(multiWrapProject(), '1mm');
  const r = rows.find(x => x.nx === 2 && x.ny === 2 && x.nz === 1 && x.orientation === 'LWH');
  const placements = r.arr.wraps.placements;
  const xs = [...new Set(placements.map(p => p.x))].sort((a, b) => a - b);
  const ys = [...new Set(placements.map(p => p.y))].sort((a, b) => a - b);
  eq(xs.length, 4, 'four distinct X columns:'); eq(ys.length, 2, 'two distinct Y rows:');
  approx(xs[1] - xs[0], 110, 'column pitch = wrap outer L:');
  approx(ys[1] - ys[0], 50, 'row pitch = wrap outer W:');
});

/* ---- Prompt 11.1: wrapAxis — machine direction is L or W, NEVER H -------
   The rule: 'auto' resolves to whichever of L/W is longer (ties to L). H is
   never eligible regardless of how it compares, since a horizontal flow
   wrapper's travel axis can never be the vertical one. ---- */
t('resolveWrapAxis: longer of L/W wins, ties to L, H never considered', () => {
  eq(resolveWrapAxis({L: 90, W: 50, H: 120}, 'auto'), 'L', 'L > W, and H(120) is irrelevant:');
  eq(resolveWrapAxis({L: 50, W: 150, H: 20}, 'auto'), 'W', 'W > L:');
  eq(resolveWrapAxis({L: 50, W: 50, H: 999}, 'auto'), 'L', 'tie -> L, H ignored however large:');
  eq(resolveWrapAxis({L: 50, W: 150, H: 20}, 'L'), 'L', 'explicit override beats auto:');
  eq(resolveWrapAxis({L: 90, W: 50, H: 120}, 'W'), 'W', 'explicit override even against the auto pick:');
});

t('swapLW is its own inverse and never touches H', () => {
  const dims = {L: 90, W: 150, H: 20};
  eq(swapLW(dims, 'L'), dims, 'axis L: identity:');
  eq(swapLW(dims, 'W'), {L: 150, W: 90, H: 20}, 'axis W: L/W swap:');
  eq(swapLW(swapLW(dims, 'W'), 'W'), dims, 'applying twice restores the original:');
});

/* ---- Prompt 11.1: W-dominant collation — the configuration the old
   L-only hardcoding got wrong. Box 90x50x20, 1x3 stacks (nx=1,ny=3) ->
   envelope 90x150x20, W(150) > L(90) -> wrapAxis resolves to W. Wrap outer:
   L unchanged at 90 (L is NOT the machine direction here), W gains
   2xendSeal (150+20=170), H +gauge (20.03). Carton cavity 90x170x21 (1mm
   up). Matches golden.json's wrap_axis_W_dominant pin exactly. ---- */
function wDominantProject(){
  const p = newProject();
  p.primary.collation = {piece: {kind: 'box', L: 90, W: 50, H: 20}, perStack: 1, stackAxis: 'Z',
                         nx: 1, ny: 3, stackGap: 0, pieceGap: 0};
  p.primary.allowedOrientations = ['LWH'];
  p.links[1].count = 1; p.links[1].arrangement = 'auto';
  p.links[0].count = 1; p.links[0].arrangement = {nx: 1, ny: 1, nz: 1};
  return p;
}

t('wrapAxis auto: a W-dominant collation wraps along W, not L', () => {
  const rows = candidateCases(wDominantProject(), '1mm');
  const r = rows.find(x => x.nx === 1 && x.ny === 1 && x.nz === 1 && x.orientation === 'LWH');
  if(!r) throw new Error('1×1×1 case row missing');
  eq(r.arr.pieces.wrapAxis, 'W', 'resolved axis:');
  eq(r.wrapOuter, {L: 90, W: 170, H: 20.03}, 'seal gain lands on W, L untouched:');
  eq(r.cartonParams.L, 90, 'carton L = wrap outer L, unchanged:');
  eq(r.cartonParams.W, 170, 'carton W = wrap outer W, gained the seal:');
  eq(r.cartonParams.H, 21, 'carton H = 20.03 rounded up 1mm:');
  eq(r.piecesPerCarton, 3, '3 pieces (1x3 stacks) x 1 wrap:');
});

t('wrapAxis explicit override: same W-dominant collation forced to L', () => {
  const p = wDominantProject();
  p.primary.wrap.wrapAxis = 'L';
  const rows = candidateCases(p, '1mm');
  const r = rows.find(x => x.nx === 1 && x.ny === 1 && x.nz === 1 && x.orientation === 'LWH');
  eq(r.arr.pieces.wrapAxis, 'L', 'override honored even though auto would pick W:');
  eq(r.wrapOuter, {L: 110, W: 150, H: 20.03}, 'seal gain now lands on L instead:');
});

/* ---- Bug 3: every orientation basis is a PROPER rotation (det +1) ---- */
t('orientation basis is a proper rotation for all six orientations', () => {
  for(const o of ORIENTATIONS){
    const d = det3(orientBasis(o));
    if(Math.abs(d - 1) > 1e-9) throw new Error(`${o}: determinant ${d}, expected +1 (reflection = mirrored die)`);
  }
  // and the basis is orthonormal (columns are unit and mutually perpendicular)
  for(const o of ORIENTATIONS){
    const c = orientBasis(o);
    const dot = (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
    if(Math.abs(dot(c[0], c[0]) - 1) > 1e-9 || Math.abs(dot(c[1], c[1]) - 1) > 1e-9 || Math.abs(dot(c[2], c[2]) - 1) > 1e-9)
      throw new Error(`${o}: columns not unit length`);
    if(Math.abs(dot(c[0], c[1])) > 1e-9 || Math.abs(dot(c[0], c[2])) > 1e-9 || Math.abs(dot(c[1], c[2])) > 1e-9)
      throw new Error(`${o}: columns not orthogonal`);
  }
});

/* ---- Step 4: optional levels — secondary/tertiary each independently
   `enabled`; a level's actual parent is the next enabled level above it (a
   fold over ['secondary','tertiary']), never a hardcoded pair. The wrap
   tier's own allowedOrientations/clearance (project.primary's) always
   describe the content's placement into whatever is actually next. ---- */

/* Pin: "no carton" — secondary disabled. Default box collation (90x50x20,
   6/stack Z -> envelope 90x50x120), no wrap, feeds the CASE directly.
   Explicit 2x2x1 grid, zero primary clearance:
     cavity L = 2*90 = 180, W = 2*50 = 100, H = 120 (1 layer, no z gap)
     case (fefco201, caliper 3) outer: +2t/+2t/+4t = 186 x 106 x 132      */
function noCartonProject(){
  const p = newProject();
  p.primary.wrap = null;
  p.primary.allowedOrientations = ['LWH'];
  p.secondary.enabled = false;
  p.links[0].count = 4;
  p.links[0].arrangement = {nx: 2, ny: 2, nz: 1};
  return p;
}

t('Step 4 pin — no carton: content feeds the case directly', () => {
  const rows = candidateCases(noCartonProject(), '1mm');
  const r = rows.find(x => x.nx === 2 && x.ny === 2 && x.nz === 1 && x.orientation === 'LWH');
  if(!r) throw new Error('2×2×1 case row missing');
  eq(r.cavity, {L: 180, W: 100, H: 120}, 'cavity = content grid, no carton in between:');
  eq(r.outer, {L: 186, W: 106, H: 132}, 'case outer, caliper 3 (+2t/+2t/+4t):');
  eq(r.geo.carton, null, 'no carton geometry — the level is disabled:');
  eq(r.cartonParams, null, 'no carton params:');
  eq(r.piecesPerCarton, null, 'no carton, no "pieces/carton" concept:');
  if(r.geo.case === null) throw new Error('case geometry missing');
});

/* Pin: "no wrap" — wrap disabled (bare collation drives the carton). Reuses
   cylProject (defined above, already hand-derived) — asserts the Step 4
   invariant specifically: no wrap style configured means no wrap geometry
   at all, and wrapFits defaults true (nothing to misreport), not a
   leftover from some prior wrapped state. */
t('Step 4 pin — no wrap: bare collation drives the carton, no wrap geometry', () => {
  const rows = candidateCases(cylProject(), '1mm');
  const r = rows.find(x => x.nx === 4 && x.ny === 3 && x.nz === 1 && x.orientation === 'LWH');
  eq(r.geo.wrap, null, 'no wrap style configured -> no wrap geometry:');
  eq(r.wrapFits, true, 'nothing to misreport when there is no wrap:');
  eq(r.arr.wraps, null, 'no wrap arrangement stored:');
  if(r.geo.carton === null || r.geo.case === null) throw new Error('carton/case must still resolve without a wrap');
});

/* Pin: "carton-only, no case" — tertiary disabled. Default box collation,
   no wrap, feeds the carton (a6120, caliper 0.457) as usual, but with the
   case disabled the CARTON becomes outermost and is itself enumerated onto
   the pallet. Explicit 2x2x1 grid of content INSIDE the carton, zero
   primary clearance:
     carton cavity L = 2*90 = 180, W = 2*50 = 100, H = 120
     carton outer (+2t/+2t/+4t at t=0.457) = 180.914 x 100.914 x 121.828  */
function cartonOnlyProject(){
  const p = newProject();
  p.primary.wrap = null;
  p.primary.allowedOrientations = ['LWH'];
  p.secondary.allowedOrientations = ['LWH'];
  p.tertiary.enabled = false;
  p.links[1].count = 4;
  p.links[1].arrangement = {nx: 2, ny: 2, nz: 1};
  return p;
}

t('Step 4 pin — carton-only: no case, the carton itself rides the pallet', () => {
  const rows = candidateCases(cartonOnlyProject(), '1mm');
  const r = rows.find(x => x.nx === 2 && x.ny === 2 && x.nz === 1 && x.orientation === 'LWH');
  if(!r) throw new Error('2×2×1 carton row missing');
  eq(r.cavity, {L: 180, W: 100, H: 120}, 'carton cavity = 2x2 content grid, zero primary clearance:');
  eq(r.outer, {L: 180.914, W: 100.914, H: 121.828}, 'carton outer, caliper 0.457 (+2t/+2t/+4t):');
  eq(r.geo.case, null, 'no case geometry — the level is disabled:');
  eq(r.geo.carton.outer, r.outer, 'the carton IS the outermost geometry riding the pallet:');
  eq(r.cartonsPerPallet, r.casesPerPallet, 'no case multiplier — the carton rides the pallet 1:1:');
});

/* Pin: "plain-box content straight to a case" — a manual outer with no
   inner and no compensation, no collation, no wrap, no carton. Box
   200x100x50 feeds the case directly. Explicit 2x1x1 grid, zero clearance:
     cavity L = 2*200 = 400, W = 100, H = 50
     case (fefco201, caliper 3) outer: +2t/+2t/+4t = 406 x 106 x 62       */
function boxProject(){
  const p = newProject();
  p.primary.wrap = null;
  p.primary.collation = null;
  p.primary.box = {L: 200, W: 100, H: 50};
  p.primary.allowedOrientations = ['LWH'];
  p.secondary.enabled = false;
  p.links[0].count = 2;
  p.links[0].arrangement = {nx: 2, ny: 1, nz: 1};
  return p;
}

t('Step 4 pin — plain-box content: outer feeds the case, no inner, no compensation', () => {
  const rows = candidateCases(boxProject(), '1mm');
  const r = rows.find(x => x.nx === 2 && x.ny === 1 && x.nz === 1 && x.orientation === 'LWH');
  if(!r) throw new Error('2×1×1 case row missing');
  eq(r.cavity, {L: 400, W: 100, H: 50}, 'cavity = 2 boxes side by side, zero clearance:');
  eq(r.outer, {L: 406, W: 106, H: 62}, 'case outer, caliper 3 (+2t/+2t/+4t):');
  eq(r.geo.carton, null, 'no carton — box content skips straight to the case:');
  eq(r.piecesPerCarton, null, 'no carton, no "pieces/carton" concept:');
  eq(r.primaryLabel, null, 'no collation -> no stack-axis label for a plain box:');
});

/* At least one packaging level must stay enabled. */
t('Step 4: disabling both carton and case throws, never silently drops the chain', () => {
  const p = newProject();
  p.secondary.enabled = false;
  p.tertiary.enabled = false;
  let threw = false;
  try{ resolveChainShape(p); }catch(e){ threw = true; }
  if(!threw) throw new Error('expected resolveChainShape to throw with nothing enabled');
});

/* The re-pointing test: toggling a level off re-points the level below it
   to whatever is now its actual parent, AND the clearance actually applied
   is the CHILD's own — never the disabled level's, never left over from
   the previous parent. Distinctive clearances on primary (wall 5) vs
   secondary (wall 1.5) make which one governed the fit decisive. */
t('Step 4: disabling a level re-points its parent, using the child\'s OWN clearance', () => {
  const p = newProject();
  p.primary.wrap = null;
  p.primary.allowedOrientations = ['LWH'];
  p.primary.clearance = {wall: 5, between: 0, bottom: 0, top: 0, betweenZ: 0};
  p.secondary.clearance = {wall: 1.5, between: 0, bottom: 0, top: 0, betweenZ: 0};
  p.links[0].arrangement = {nx: 1, ny: 1, nz: 1};   // one child in the case — a single wall gap shows up cleanly

  // secondary enabled (default): the case wraps the CARTON using the
  // CARTON's own clearance (secondary.clearance, wall 1.5 -> +3 on L)
  const withCarton = candidateCases(p, '1mm').find(r => r.nx === 1 && r.ny === 1 && r.nz === 1);
  approx(withCarton.cavity.L, Math.ceil(withCarton.cartonOuter.L + 3), 'case wraps the carton with the CARTON\'s own wall clearance (rounded up 1mm):');

  // disable the carton: the case re-points to whatever's below it (the
  // bare collation, since there's no wrap) and must use THAT level's OWN
  // clearance (primary.clearance, wall 5 -> +10) — never the disabled
  // carton's, and never left over from the previous parent
  p.secondary.enabled = false;
  const noCarton = candidateCases(p, '1mm').find(r => r.nx === 1 && r.ny === 1 && r.nz === 1);
  eq(noCarton.geo.carton, null, 're-pointed: no carton in the chain any more:');
  approx(noCarton.cavity.L, 90 + 10, 'case now wraps the CONTENT directly with the CONTENT\'s own wall clearance (5x2):');
});

const fails = results.filter(r => r.startsWith('FAIL')).length;
document.getElementById('out').textContent =
  `${results.length - fails}/${results.length} passed\n\n` + results.join('\n');
window.__tests = {total: results.length, fails, results};
</script>
