<!doctype html>
<meta charset="utf-8">
<title>golden verify</title>
<pre id="out">running…</pre>
<script type="module">
import {fefco201} from '../src/core/styles/fefco201.js';
import {packLayer, stack} from '../src/core/pack.js';
import {toMM, fromMM} from '../src/core/units.js';

const golden = await (await fetch('golden.json')).json();
const report = {pass: 0, fail: 0, mismatches: []};

function cmp(caseName, path, expected, actual){
  if(expected === actual){ report.pass++; return; }
  report.fail++;
  report.mismatches.push({
    case: caseName, path, expected, actual,
    delta: (typeof expected === 'number' && typeof actual === 'number') ? actual - expected : null
  });
}

for(const [name, c] of Object.entries(golden.cases)){
  const u = c.unit;
  const params = {
    L: toMM(c.inputs.L, u), W: toMM(c.inputs.W, u), H: toMM(c.inputs.H, u),
    caliper: toMM(c.inputs.cal, u), glue: toMM(c.inputs.glue, u), slot: toMM(c.inputs.slot, u)
  };
  const g = fefco201(params);
  const d = v => fromMM(v, u);          // core mm -> the unit golden was recorded in

  cmp(name, 'F', c.F, d(g.meta.flapDepth));
  cmp(name, 'bbox.minX', c.bbox.minX, d(g.bbox.minX));
  cmp(name, 'bbox.minY', c.bbox.minY, d(g.bbox.minY));
  cmp(name, 'bbox.maxX', c.bbox.maxX, d(g.bbox.maxX));
  cmp(name, 'bbox.maxY', c.bbox.maxY, d(g.bbox.maxY));
  cmp(name, 'cut.length', c.cut.length, g.cut.length);
  c.cut.forEach((pt, i) => {
    cmp(name, `cut[${i}].x`, pt[0], d(g.cut[i][0]));
    cmp(name, `cut[${i}].y`, pt[1], d(g.cut[i][1]));
  });
  cmp(name, 'crease.length', c.crease.length, g.crease.length);
  c.crease.forEach((s, i) => s.forEach((v, j) => cmp(name, `crease[${i}][${j}]`, v, d(g.crease[i][j]))));

  // pallet: 48x40in deck, 60in max height (as recorded)
  const pallet = {L: toMM(48, 'in'), W: toMM(40, 'in'), maxH: toMM(60, 'in')};
  const PALLET_BASE_H = 16 + 95 + 16; // deck+stringer+bottom, mm (matches pallet3d)
  for(const pattern of ['column', 'optimal', 'interlock']){
    const layer = packLayer({childL: g.outer.L, childW: g.outer.W, parentL: pallet.L, parentW: pallet.W, pattern});
    const s = stack({perLayer: layer.perLayer, childH: g.outer.H, parentMaxH: pallet.maxH, baseH: PALLET_BASE_H});
    const label = layer.perLayer > 0 ? layer.label + (pattern === 'interlock' ? ' · interlocked' : '') : 'does not fit';
    const cov = Math.round(layer.perLayer*g.outer.L*g.outer.W/(pallet.L*pallet.W)*100);
    const gp = c.pallet[pattern];
    cmp(name, `pallet.${pattern}.label`, gp.label, label);
    cmp(name, `pallet.${pattern}.perLayer`, gp.perLayer, layer.perLayer);
    cmp(name, `pallet.${pattern}.layers`, gp.layers, s.layers);
    cmp(name, `pallet.${pattern}.total`, gp.total, s.total);
    cmp(name, `pallet.${pattern}.coveragePct`, gp.coveragePct, cov);
  }
}

// classify numeric mismatches: FP round-trip noise vs real behavioural change
for(const m of report.mismatches){
  m.kind = (m.delta !== null && Math.abs(m.delta) < 1e-9) ? 'FP_NOISE' : 'REAL';
}
report.summary = {
  totalChecks: report.pass + report.fail,
  pass: report.pass,
  fail: report.fail,
  realMismatches: report.mismatches.filter(m => m.kind === 'REAL').length,
  fpNoise: report.mismatches.filter(m => m.kind === 'FP_NOISE').length
};
document.getElementById('out').textContent = JSON.stringify(report, null, 2);
window.__report = report;
</script>
