<!doctype html>
<meta charset="utf-8">
<title>golden verify</title>
<pre id="out">running…</pre>
<script type="module">
import {styleById} from '../src/core/styles/index.js';
import {fitInto} from '../src/core/containment.js';
import {toMM, fromMM} from '../src/core/units.js';
import {newProject, candidateCases} from '../src/core/project.js';

const golden = await (await fetch('golden.json')).json();
const report = {pass: 0, fail: 0, mismatches: []};

// numeric tolerance 1e-9 (in the golden case's own unit): inch->mm->inch
// round-trip noise sits at ~1e-14, real deviations at >= 0.15, so this
// separates IEEE 754 artifacts from dimensional changes with 5 orders of
// headroom on each side. Strings and integers still compare exactly.
const TOL = 1e-9;
function cmp(caseName, path, expected, actual){
  const numOK = typeof expected === 'number' && typeof actual === 'number' && Math.abs(expected - actual) <= TOL;
  if(expected === actual || numOK){ report.pass++; return; }
  report.fail++;
  report.mismatches.push({
    case: caseName, path, expected, actual,
    delta: (typeof expected === 'number' && typeof actual === 'number') ? actual - expected : null
  });
}

for(const [name, c] of Object.entries(golden.cases)){
  const u = c.unit;
  const params = {};
  for(const [k, v] of Object.entries(c.inputs))
    params[k === 'cal' ? 'caliper' : k] = toMM(v, u);   // 'cal' is the legacy golden key
  const g = styleById(c.style || 'fefco201').geometry(params);
  const d = v => fromMM(v, u);          // core mm -> the unit golden was recorded in

  cmp(name, 'F', c.F, d(g.meta.flapDepth));
  if(c.outer){ // outside dims (raw-caliper compensation — the MIN_CALIPER regression pin)
    cmp(name, 'outer.L', c.outer.L, d(g.outer.L));
    cmp(name, 'outer.W', c.outer.W, d(g.outer.W));
    cmp(name, 'outer.H', c.outer.H, d(g.outer.H));
  }
  cmp(name, 'bbox.minX', c.bbox.minX, d(g.bbox.minX));
  cmp(name, 'bbox.minY', c.bbox.minY, d(g.bbox.minY));
  cmp(name, 'bbox.maxX', c.bbox.maxX, d(g.bbox.maxX));
  cmp(name, 'bbox.maxY', c.bbox.maxY, d(g.bbox.maxY));
  cmp(name, 'cut.length', c.cut.length, g.cut.length);
  c.cut.forEach((pt, i) => {
    cmp(name, `cut[${i}].x`, pt[0], d(g.cut[i][0]));
    cmp(name, `cut[${i}].y`, pt[1], d(g.cut[i][1]));
  });
  cmp(name, 'crease.length', c.crease.length, g.crease.length);
  c.crease.forEach((s, i) => s.forEach((v, j) => cmp(name, `crease[${i}][${j}]`, v, d(g.crease[i][j]))));

  // pallet: 48x40in deck, 60in max height (as recorded) — through fitInto,
  // the same path the app takes (vertical-axis rotation only, zero clearance)
  const pallet = {L: toMM(48, 'in'), W: toMM(40, 'in'), maxH: toMM(60, 'in')};
  const PALLET_BASE_H = 16 + 95 + 16; // deck+stringer+bottom, mm (matches pallet3d)
  for(const pattern of ['column', 'optimal', 'interlock']){
    const arr = fitInto(
      {outer: g.outer, allowedOrientations: ['LWH', 'WLH']},
      {L: pallet.L, W: pallet.W, H: pallet.maxH - PALLET_BASE_H},
      {wall: 0, between: 0},
      pattern
    );
    const label = arr.perLayer > 0 ? arr.label + (pattern === 'interlock' ? ' · interlocked' : '') : 'does not fit';
    const cov = Math.round(arr.perLayer*g.outer.L*g.outer.W/(pallet.L*pallet.W)*100);
    const gp = c.pallet[pattern];
    cmp(name, `pallet.${pattern}.label`, gp.label, label);
    cmp(name, `pallet.${pattern}.perLayer`, gp.perLayer, arr.perLayer);
    cmp(name, `pallet.${pattern}.layers`, gp.layers, arr.layers);
    cmp(name, `pallet.${pattern}.total`, gp.total, arr.total);
    cmp(name, `pallet.${pattern}.coveragePct`, gp.coveragePct, cov);
  }
}

// full-chain regression pins: [collation ->] carton -> case -> pallet
for(const [name, ch] of Object.entries(golden.chains || {})){
  const p = newProject();
  if(ch.config.collation){
    p.primary.collation = {...ch.config.collation, piece: {...ch.config.collation.piece}};
    p.primary.allowedOrientations = ch.config.primaryOrientations;
    p.primary.clearance = {...ch.config.primaryClearance};
    p.secondary.params = {...p.secondary.params, ...ch.config.cartonMaterial};
  }else{
    p.primary = null;                       // legacy carton-driven pin
    p.secondary.params = {...ch.config.carton};
  }
  p.secondary.allowedOrientations = ch.config.orientations;
  p.secondary.clearance = {...ch.config.clearance};
  p.links[0].count = ch.config.count;
  p.links[0].arrangement = ch.config.arrangement;
  const a = ch.config.arrangement;
  const r = candidateCases(p, ch.config.rounding)
    .find(x => x.nx === a.nx && x.ny === a.ny && x.nz === a.nz && x.orientation === ch.config.orientations[0]);
  const e = ch.expected;
  if(e.cartonOuter){
    cmp(name, 'cartonOuter.L', e.cartonOuter.L, r.cartonOuter.L);
    cmp(name, 'cartonOuter.W', e.cartonOuter.W, r.cartonOuter.W);
    cmp(name, 'cartonOuter.H', e.cartonOuter.H, r.cartonOuter.H);
  }
  if(e.piecesPerPallet !== undefined) cmp(name, 'piecesPerPallet', e.piecesPerPallet, r.piecesPerPallet);
  cmp(name, 'cavity.L', e.cavity.L, r.cavity.L); cmp(name, 'cavity.W', e.cavity.W, r.cavity.W); cmp(name, 'cavity.H', e.cavity.H, r.cavity.H);
  cmp(name, 'outer.L', e.outer.L, r.outer.L); cmp(name, 'outer.W', e.outer.W, r.outer.W); cmp(name, 'outer.H', e.outer.H, r.outer.H);
  cmp(name, 'boardAreaM2', e.boardAreaM2, +r.boardAreaM2.toFixed(6));
  cmp(name, 'casesPerLayer', e.casesPerLayer, r.casesPerLayer);
  cmp(name, 'caseLayers', e.caseLayers, r.caseLayers);
  cmp(name, 'casesPerPallet', e.casesPerPallet, r.casesPerPallet);
  cmp(name, 'cartonsPerPallet', e.cartonsPerPallet, r.cartonsPerPallet);
  cmp(name, 'coveragePct', e.coveragePct, r.coveragePct);
  cmp(name, 'cubeUtilPct', e.cubeUtilPct, r.cubeUtilPct);
}

// classify numeric mismatches: FP round-trip noise vs real behavioural change
for(const m of report.mismatches){
  m.kind = (m.delta !== null && Math.abs(m.delta) < 1e-9) ? 'FP_NOISE' : 'REAL';
}
report.summary = {
  totalChecks: report.pass + report.fail,
  pass: report.pass,
  fail: report.fail,
  realMismatches: report.mismatches.filter(m => m.kind === 'REAL').length,
  fpNoise: report.mismatches.filter(m => m.kind === 'FP_NOISE').length
};
document.getElementById('out').textContent = JSON.stringify(report, null, 2);
window.__report = report;
</script>
